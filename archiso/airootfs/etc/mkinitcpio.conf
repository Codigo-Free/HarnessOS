# HarnessOS — mkinitcpio configuration for live environment
# NOTE: 'autodetect' is intentionally excluded — it fails in container
# build environments (CI/Docker) because it tries to scan running hardware.
# Modules are explicitly listed so USB storage is available before the
# 'archiso' hook runs to find the squashfs on the live USB device.

MODULES=(xhci_hcd ehci_hcd usb_storage sd_mod squashfs)
BINARIES=()
FILES=()

HOOKS=(base udev archiso block filesystems keyboard)
