monitor=,preferred,auto,auto

# --- Autostart ---
exec-once = swaybg -m fill -i /usr/share/harness/logo.png
exec-once = sleep 2 && waybar
exec-once = swaync
exec-once = nm-applet --indicator

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = yes
    }
}

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(1e2a3a88)
    layout = dwindle
    resize_on_border = true
}

misc {
    background_color = 0x0a0e1a
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.92
    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(000000cc)
    }
}

animations {
    enabled = yes
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, smooth, slide
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, smooth, slidevert
}

dwindle {
    preserve_split = yes
}

$mod = SUPER

# --- Apps ---
bind = $mod, Return, exec, kitty
bind = $mod, Q, exec, kitty
bind = $mod, B, exec, firefox
bind = $mod, E, exec, code
bind = $mod, R, exec, wofi --show drun

# --- Ventanas ---
bind = $mod, W, killactive
bind = $mod, F, fullscreen
bind = $mod, Space, togglefloating

# --- Foco ---
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# --- 4 Escritorios ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4

# --- Mover ventanas ---
bind = $mod CTRL, left,  movewindow, l
bind = $mod CTRL, right, movewindow, r
bind = $mod CTRL, up,    movewindow, u
bind = $mod CTRL, down,  movewindow, d

# --- Mouse ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Sistema ---
bind = $mod SHIFT, E, exit
bind = $mod SHIFT, R, exec, hyprctl reload
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -

# --- AI ---
bind = $mod, C, exec, kitty -e claude
bind = $mod, O, exec, kitty -e ollama run llama3.2
