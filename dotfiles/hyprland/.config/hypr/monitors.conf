# HarnessOS — Monitor Configuration
# Default: auto-detect all monitors with preferred resolution at 60Hz
# Customize per-machine by overriding in ~/.config/hypr/monitors.local.conf

monitor = , preferred, auto, 1

# Laptop internal display example:
# monitor = eDP-1, 1920x1080@60, 0x0, 1

# External monitor to the right:
# monitor = HDMI-A-1, 2560x1440@144, 1920x0, 1

# Load machine-local overrides if they exist
source = ~/.config/hypr/monitors.local.conf
