# HarnessOS — Hyprland Window Rules

# ---------------------------------------------------------------------------
# FLOATING WINDOWS
# ---------------------------------------------------------------------------
windowrule  = float, class:floating-term
windowrule  = size 900 600, class:floating-term
windowrule  = center, class:floating-term

windowrule  = float, class:nm-connection-editor
windowrule  = float, class:pavucontrol
windowrule  = float, class:blueman-manager
windowrule  = float, title:^(Picture-in-Picture)$
windowrule  = float, class:file_progress
windowrule  = float, class:confirm
windowrule  = float, class:dialog
windowrule  = float, class:download

# AI terminals floating by default for quick access
windowrule  = float, class:ai-terminal
windowrule  = size 1200 700, class:ai-terminal
windowrule  = center, class:ai-terminal

# ---------------------------------------------------------------------------
# WORKSPACE ASSIGNMENTS
# ---------------------------------------------------------------------------
windowrulev2 = workspace 1, class:kitty
windowrulev2 = workspace 2, class:firefox
windowrulev2 = workspace 2, class:chromium
windowrulev2 = workspace 3, class:ai-terminal
windowrulev2 = workspace 4, class:docker-desktop
windowrulev2 = workspace 5, class:discord
windowrulev2 = workspace 5, class:slack
windowrulev2 = workspace 5, class:teams-for-linux

# ---------------------------------------------------------------------------
# OPACITY
# ---------------------------------------------------------------------------
windowrulev2 = opacity 0.95 0.90, class:kitty
windowrulev2 = opacity 0.92 0.85, class:ai-terminal

# ---------------------------------------------------------------------------
# SPECIAL
# ---------------------------------------------------------------------------
windowrulev2 = suppressevent maximize, class:.*
