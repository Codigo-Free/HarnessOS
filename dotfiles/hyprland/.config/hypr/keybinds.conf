# HarnessOS — Hyprland Keybindings
# Convention: $mod = SUPER (Windows/Meta key)

$mod = SUPER
$terminal = kitty
$launcher = wofi --show drun --allow-images
$filemanager = thunar

# ---------------------------------------------------------------------------
# CORE — Launch
# ---------------------------------------------------------------------------
bind = $mod, Return,         exec, $terminal
bind = $mod SHIFT, Return,   exec, $terminal --class floating-term
bind = $mod, Space,          exec, $launcher
bind = $mod, E,              exec, $filemanager
bind = $mod, B,              exec, firefox

# ---------------------------------------------------------------------------
# AI TOOLS — Quick access
# ---------------------------------------------------------------------------
bind = $mod, C,              exec, $terminal --class ai-terminal --title "Claude" -e claude
bind = $mod, O,              exec, $terminal --class ai-terminal --title "Ollama" -e sh -c 'ollama run llama3.2'
bind = $mod SHIFT, C,        exec, $terminal --class ai-terminal --title "Copilot" -e gh copilot suggest

# ---------------------------------------------------------------------------
# WINDOW MANAGEMENT
# ---------------------------------------------------------------------------
bind = $mod, Q,              killactive
bind = $mod SHIFT, Q,        exit
bind = $mod, F,              fullscreen, 0
bind = $mod SHIFT, F,        fullscreen, 1
bind = $mod, V,              togglefloating
bind = $mod, P,              pin
bind = $mod, J,              togglesplit
bind = $mod, D,              pseudo

# ---------------------------------------------------------------------------
# FOCUS — Vim-style hjkl
# ---------------------------------------------------------------------------
bind = $mod, H,              movefocus, l
bind = $mod, L,              movefocus, r
bind = $mod, K,              movefocus, u
bind = $mod, J,              movefocus, d

# ---------------------------------------------------------------------------
# MOVE WINDOWS
# ---------------------------------------------------------------------------
bind = $mod SHIFT, H,        movewindow, l
bind = $mod SHIFT, L,        movewindow, r
bind = $mod SHIFT, K,        movewindow, u
bind = $mod SHIFT, J,        movewindow, d

# ---------------------------------------------------------------------------
# RESIZE
# ---------------------------------------------------------------------------
binde = $mod ALT, H,         resizeactive, -40 0
binde = $mod ALT, L,         resizeactive, 40 0
binde = $mod ALT, K,         resizeactive, 0 -40
binde = $mod ALT, J,         resizeactive, 0 40

# ---------------------------------------------------------------------------
# WORKSPACES — Switch (1-9)
# Semantic: 1=Code, 2=Browser, 3=AI, 4=Docker/Infra, 5=Chat
# ---------------------------------------------------------------------------
bind = $mod, 1,              workspace, 1
bind = $mod, 2,              workspace, 2
bind = $mod, 3,              workspace, 3
bind = $mod, 4,              workspace, 4
bind = $mod, 5,              workspace, 5
bind = $mod, 6,              workspace, 6
bind = $mod, 7,              workspace, 7
bind = $mod, 8,              workspace, 8
bind = $mod, 9,              workspace, 9

# Move active window to workspace
bind = $mod SHIFT, 1,        movetoworkspace, 1
bind = $mod SHIFT, 2,        movetoworkspace, 2
bind = $mod SHIFT, 3,        movetoworkspace, 3
bind = $mod SHIFT, 4,        movetoworkspace, 4
bind = $mod SHIFT, 5,        movetoworkspace, 5
bind = $mod SHIFT, 6,        movetoworkspace, 6
bind = $mod SHIFT, 7,        movetoworkspace, 7
bind = $mod SHIFT, 8,        movetoworkspace, 8
bind = $mod SHIFT, 9,        movetoworkspace, 9

# Scroll through workspaces
bind = $mod, mouse_down,     workspace, e+1
bind = $mod, mouse_up,       workspace, e-1
bind = $mod, Tab,            workspace, e+1
bind = $mod SHIFT, Tab,      workspace, e-1

# ---------------------------------------------------------------------------
# MOUSE BINDS
# ---------------------------------------------------------------------------
bindm = $mod, mouse:272,     movewindow
bindm = $mod, mouse:273,     resizewindow

# ---------------------------------------------------------------------------
# SCREENSHOTS
# ---------------------------------------------------------------------------
bind = , Print,              exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copied to clipboard"
bind = SHIFT, Print,         exec, grim "${HOME}/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png" && notify-send "Screenshot" "Saved to ~/Pictures/Screenshots"
bind = $mod, Print,          exec, grim - | wl-copy && notify-send "Screenshot" "Full screen copied"

# ---------------------------------------------------------------------------
# CLIPBOARD
# ---------------------------------------------------------------------------
bind = $mod, period,         exec, cliphist list | wofi --show dmenu | cliphist decode | wl-copy

# ---------------------------------------------------------------------------
# NOTIFICATIONS
# ---------------------------------------------------------------------------
bind = $mod, N,              exec, swaync-client -t

# ---------------------------------------------------------------------------
# LOCK SCREEN
# ---------------------------------------------------------------------------
bind = $mod, Escape,         exec, hyprlock

# ---------------------------------------------------------------------------
# MEDIA & AUDIO (XF86 keys)
# ---------------------------------------------------------------------------
binde = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind  = , XF86AudioPlay,         exec, playerctl play-pause
bind  = , XF86AudioNext,         exec, playerctl next
bind  = , XF86AudioPrev,         exec, playerctl previous

binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
