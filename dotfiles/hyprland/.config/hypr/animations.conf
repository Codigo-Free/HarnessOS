# HarnessOS — Hyprland Animations
# Fast and minimal — developer-focused, not flashy

animations {
    enabled = true

    bezier = md3_standard, 0.2, 0, 0, 1.0
    bezier = md3_decel,    0.05, 0.7, 0.1, 1
    bezier = md3_accel,    0.3, 0, 0.8, 0.15
    bezier = overshot,     0.05, 0.9, 0.1, 1.05
    bezier = linear,       0.0, 0.0, 1.0, 1.0

    animation = windows,     1, 2,   md3_decel,    slide
    animation = windowsIn,   1, 2,   md3_decel,    slide
    animation = windowsOut,  1, 1.5, md3_accel,    slide
    animation = border,      1, 8,   md3_standard
    animation = borderangle, 1, 100, linear,       loop
    animation = fade,        1, 2,   md3_standard
    animation = workspaces,  1, 3,   md3_decel,    slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}
