name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build ISO and publish release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    permissions:
      contents: write

    steps:
      - name: Install git (needed for submodule checkout)
        run: pacman -Sy --noconfirm git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install archiso + ssh tools
        run: pacman -Sy --noconfirm archiso mkinitcpio-archiso openssh

      - name: Inject installer into airootfs
        run: |
          TARGET="archiso/airootfs/usr/local/lib/harness/installer"
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          cp -r installer/harness_installer "$TARGET/"
          cp    installer/requirements.txt   "$TARGET/"

      - name: Inject galago into airootfs
        run: |
          TARGET="archiso/airootfs/usr/local/share/harness/easter-egg/galago"
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          cp -r galago/galago.py galago/src galago/assets "$TARGET/"
          find "$TARGET" -name '__pycache__' -exec rm -rf {} +

      - name: Build ISO
        run: |
          mkdir -p out
          mkarchiso -v -w /tmp/harness-work -o ./out ./archiso

      - name: Generate checksums
        run: |
          cd out
          ISO=$(ls *.iso | head -1)
          sha256sum "${ISO}" > "${ISO}.sha256"
          echo "ISO_NAME=${ISO}" >> $GITHUB_ENV
          echo "ISO_SIZE=$(du -sh ${ISO} | cut -f1)" >> $GITHUB_ENV

      - name: Upload ISO to VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST:    ${{ secrets.VPS_HOST }}
          VPS_USER:    ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/ci_key
          chmod 600 ~/.ssh/ci_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          # Remove old ISOs and upload the new one
          ssh -i ~/.ssh/ci_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "rm -f /var/www/html/harnessOS/*.iso && echo 'old ISOs removed'"
          scp -i ~/.ssh/ci_key -o StrictHostKeyChecking=no \
            out/${{ env.ISO_NAME }} \
            "$VPS_USER@$VPS_HOST:/var/www/html/harnessOS/"
          echo "Upload complete"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.sha256
          name: "HarnessOS ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## HarnessOS ${{ github.ref_name }}

            > **ISO is 3 GB — hosted on VPS** (GitHub has a 2 GB release limit)

            ### Download
            ```bash
            wget http://${{ secrets.VPS_HOST }}:8899/${{ env.ISO_NAME }}
            ```

            ### Flash to USB
            ```bash
            sudo dd if=${{ env.ISO_NAME }} of=/dev/sdX bs=4M status=progress oflag=sync
            ```

            ### Install
            Boot from USB → run `harness-install` → follow the TUI wizard

            ### Post-install
            ```bash
            harness setup    # wizard: GitHub, Claude, Ollama model
            harness doctor   # verify everything works
            ```

            ### What's included
            - `harness` CLI: info, doctor, setup, update, snapshot, install profiles, ai
            - `harness ai` — local AI chat that sees your system state in real-time
            - Hyprland + Waybar + Kitty (Tokyo Night)
            - Claude CLI, GitHub Copilot, Ollama (llama3.2)
            - Docker + NVIDIA container runtime (auto-configured on install)
            - Python 3, Node.js LTS, .NET SDK, Java, PHP
            - linux-zen kernel + BTRFS with snapper auto-snapshots
            - Developer profiles: `harness install web|ml|devops|security`

            ### Verify download
            ```bash
            sha256sum -c ${{ env.ISO_NAME }}.sha256
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
